name: Build and Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 mypy pytest pytest-xvfb

      - name: Lint with flake8
        run: |
          flake8 . --count --max-complexity=15 --max-line-length=100 --statistics

      - name: Type check with mypy
        run: |
          mypy main.py ui/ modbus/ calculators/ converters/ logger/ utils/ --ignore-missing-imports

      - name: Install system dependencies for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libegl1 libxkbcommon0 libfontconfig1

      - name: Test with pytest
        run: |
          pytest tests/ -v --timeout=30
        env:
          QT_QPA_PLATFORM: offscreen
